<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Meeting Recorder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-hover: #1a1a26;
    --border: #222233;
    --border-active: #4f46e5;
    --primary: #6366f1;
    --primary-glow: rgba(99,102,241,0.15);
    --accent: #818cf8;
    --red: #ef4444;
    --red-glow: rgba(239,68,68,0.2);
    --green: #22c55e;
    --green-glow: rgba(34,197,94,0.15);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: 24px 16px;
    overflow-x: hidden;
  }
  @media (max-width: 639px) { body { padding: 16px 12px; } }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.6); opacity: 0.3; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes waveform {
    0%, 100% { height: 3px; }
    50% { height: var(--h); }
  }
  @keyframes bigPulseRing {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  .container { max-width: 720px; margin: 0 auto; width: 100%; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 12px; }
  @media (max-width: 639px) { .header { margin-bottom: 20px; } }

  .title {
    font-size: 28px; font-weight: 700; margin: 0;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  @media (max-width: 639px) { .title { font-size: 22px; } }

  .subtitle { font-size: 14px; color: var(--text-muted); margin: 2px 0 0; }
  @media (max-width: 639px) { .subtitle { font-size: 12px; } }

  .lang-wrap { position: relative; flex-shrink: 0; }
  .lang-btn {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px; font-size: 13px;
    font-family: 'Outfit', sans-serif; cursor: pointer; display: flex;
    align-items: center; gap: 6px; min-height: 36px;
    -webkit-tap-highlight-color: transparent; transition: all 0.15s;
  }
  .lang-btn:active { transform: scale(0.96); }
  @media (max-width: 639px) { .lang-btn { padding: 10px 14px; min-height: 44px; } }

  .lang-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; z-index: 100; min-width: 150px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: fadeIn 0.15s ease;
    display: none;
  }
  .lang-menu.open { display: block; }
  .lang-menu button {
    display: block; width: 100%; padding: 10px 16px; background: transparent;
    color: var(--text); border: none; border-bottom: 1px solid var(--border);
    font-size: 14px; font-family: 'Outfit', sans-serif; cursor: pointer; text-align: left;
    -webkit-tap-highlight-color: transparent;
  }
  .lang-menu button:active { opacity: 0.7; }
  .lang-menu button.active { background: var(--primary-glow); color: var(--accent); }
  @media (max-width: 639px) { .lang-menu button { padding: 14px 16px; } }

  .backdrop { position: fixed; inset: 0; z-index: 50; display: none; }
  .backdrop.open { display: block; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; margin-bottom: 20px; transition: all 0.4s;
  }
  .card.recording { border-color: var(--primary); box-shadow: 0 0 40px var(--primary-glow); }
  @media (max-width: 639px) {
    .card { border-radius: 16px; padding: 20px 16px; margin-bottom: 14px; }
  }

  .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  @media (max-width: 639px) { .status-row { margin-bottom: 14px; } }

  .status-indicator { display: flex; align-items: center; gap: 10px; }
  .rec-dot { position: relative; width: 10px; height: 10px; display: none; }
  .rec-dot.active { display: block; }
  .rec-dot-inner {
    width: 10px; height: 10px; border-radius: 50%; background: var(--red);
    position: absolute; animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 12px var(--red);
  }
  .rec-dot-ring {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--red); position: absolute;
    animation: bigPulseRing 1.5s ease-out infinite;
  }
  .status-label {
    font-size: 14px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-dim);
  }
  @media (max-width: 639px) { .status-label { font-size: 12px; } }

  .timer {
    font-family: 'JetBrains Mono', monospace; font-size: 34px;
    font-weight: 600; color: var(--text-dim); letter-spacing: 0.05em;
  }
  @media (max-width: 639px) { .timer { font-size: 26px; } }

  .speaker-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--primary-glow); border: 1px solid rgba(99,102,241,0.25);
    border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--accent);
    margin-top: 10px;
  }
  .speaker-badge.hidden { display: none; }

  /* Debug status */
  .debug-status {
    font-size: 11px; color: var(--text-muted); margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 10px; background: rgba(255,255,255,0.03);
    border-radius: 8px; display: none;
  }
  .debug-status.visible { display: block; }

  .waveform { display: flex; align-items: center; gap: 3px; height: 36px; justify-content: center; }
  @media (max-width: 639px) { .waveform { gap: 2px; height: 28px; } }
  .wave-bar {
    width: 3px; border-radius: 2px; background: var(--border); height: 3px; transition: height 0.3s;
  }
  .wave-bar.active { background: linear-gradient(180deg, var(--primary), var(--accent)); }
  @media (max-width: 639px) { .wave-bar { width: 2.5px; } }

  .rec-btn-wrap { display: flex; justify-content: center; margin: 12px 0 8px; }
  @media (max-width: 639px) { .rec-btn-wrap { margin: 8px 0 4px; } }
  .rec-btn {
    width: 88px; height: 88px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, var(--primary), #4338ca);
    color: #fff; font-size: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px var(--primary-glow), 0 0 0 4px rgba(99,102,241,0.12);
    -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
  }
  .rec-btn:active { transform: scale(0.94); }
  @media (max-width: 639px) { .rec-btn { width: 80px; height: 80px; font-size: 32px; } }

  .rec-hint { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  @media (max-width: 639px) { .rec-hint { font-size: 12px; } }

  .controls { display: grid; gap: 12px; margin-top: 24px; }
  .controls.two { grid-template-columns: 1fr 1fr; }
  .controls.three { grid-template-columns: 1fr 1fr auto; }
  @media (max-width: 639px) { .controls { gap: 10px; margin-top: 16px; } }

  .btn {
    border: none; border-radius: 12px; padding: 12px 24px;
    font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 8px; min-height: 44px; -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  @media (max-width: 639px) {
    .btn { border-radius: 14px; padding: 14px 16px; font-size: 14px; min-height: 48px; }
  }

  .btn-pause { background: var(--surface-hover); color: var(--accent); border: 1px solid var(--border); }
  .btn-stop { background: var(--red-glow); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-resume { background: linear-gradient(135deg, var(--primary), #4338ca); color: #fff; }
  .btn-new { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
  .btn-summary { background: linear-gradient(135deg, var(--primary), #4338ca); color: #fff; }
  .btn-export { background: var(--green-glow); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }

  .transcript-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  @media (max-width: 639px) { .transcript-header { padding: 12px 16px; } }

  .transcript-title { font-size: 15px; font-weight: 600; }
  @media (max-width: 639px) { .transcript-title { font-size: 14px; } }

  .transcript-count { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  .transcript-body {
    height: 340px; min-height: 280px; overflow-y: auto;
    padding: 16px 24px; -webkit-overflow-scrolling: touch;
  }
  @media (max-width: 639px) {
    .transcript-body { height: 40dvh; min-height: 220px; padding: 12px 16px; }
  }
  .transcript-body::-webkit-scrollbar { width: 6px; }
  .transcript-body::-webkit-scrollbar-track { background: transparent; }
  .transcript-body::-webkit-scrollbar-thumb { background: #222233; border-radius: 3px; }

  .transcript-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); font-size: 14px;
    text-align: center; padding: 0 16px; white-space: pre-line;
  }
  @media (max-width: 639px) { .transcript-empty { font-size: 13px; } }

  .transcript-line { display: flex; gap: 12px; margin-bottom: 14px; animation: fadeIn 0.3s ease; }
  @media (max-width: 639px) { .transcript-line { gap: 8px; margin-bottom: 12px; } }

  .transcript-time {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); white-space: nowrap; padding-top: 3px;
    min-width: 72px; flex-shrink: 0;
  }
  @media (max-width: 639px) { .transcript-time { font-size: 10px; min-width: 58px; } }

  .transcript-content { flex: 1; min-width: 0; }

  .speaker-tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px; margin-bottom: 3px;
    letter-spacing: 0.03em;
  }

  .transcript-text { font-size: 14px; line-height: 1.7; color: var(--text); word-break: break-word; }
  @media (max-width: 639px) { .transcript-text { font-size: 13px; } }

  .interim { opacity: 0.5; }
  .interim .transcript-text { color: var(--text-dim); font-style: italic; }

  .speaker-divider {
    display: flex; align-items: center; gap: 10px; margin: 8px 0;
    font-size: 11px; color: var(--text-muted);
  }
  .speaker-divider::before, .speaker-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .summary-card {
    background: var(--surface); border: 1px solid var(--border-active);
    border-radius: 20px; overflow: hidden; animation: fadeIn 0.4s ease;
    margin-bottom: 20px; display: none;
  }
  .summary-card.visible { display: block; }
  @media (max-width: 639px) { .summary-card { border-radius: 16px; margin-bottom: 14px; } }

  .summary-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--primary-glow); font-size: 15px; font-weight: 600;
  }
  @media (max-width: 639px) { .summary-header { padding: 12px 16px; font-size: 14px; } }

  .summary-body { padding: 16px 24px; }
  @media (max-width: 639px) { .summary-body { padding: 12px 16px; } }

  .summary-body h3 {
    font-size: 16px; font-weight: 600; color: var(--accent);
    margin: 14px 0 6px; font-family: 'Outfit', sans-serif;
  }
  @media (max-width: 639px) { .summary-body h3 { font-size: 15px; } }

  .summary-body .item { display: flex; gap: 8px; margin-bottom: 4px; padding-left: 2px; }
  .summary-body .bullet { color: var(--primary); flex-shrink: 0; }
  .summary-body .item-text { color: var(--text); line-height: 1.6; font-size: 14px; }
  @media (max-width: 639px) { .summary-body .item-text { font-size: 13px; } }

  .summary-body p { color: var(--text); line-height: 1.6; margin: 2px 0; font-size: 14px; }
  @media (max-width: 639px) { .summary-body p { font-size: 13px; } }

  .summary-body hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  .skeleton {
    height: 14px; border-radius: 7px;
    background: linear-gradient(90deg, var(--border) 25%, var(--surface-hover) 50%, var(--border) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 10px;
  }

  .error-banner {
    background: var(--red-glow); border: 1px solid var(--red);
    border-radius: 20px; padding: 16px; margin-bottom: 24px;
    font-size: 14px; line-height: 1.5; display: none;
  }
  .error-banner.visible { display: block; }
  @media (max-width: 639px) {
    .error-banner { border-radius: 16px; padding: 14px 16px; font-size: 13px; margin-bottom: 16px; }
  }

  .footer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    margin-top: 24px; padding-bottom: 8px; line-height: 1.5;
  }
  @media (max-width: 639px) { .footer { margin-top: 16px; padding-bottom: 24px; } }

  .info-badge {
    display: inline-block; background: var(--primary-glow); color: var(--accent);
    font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-top: 12px;
    border: 1px solid rgba(99,102,241,0.2);
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1 class="title">Meeting Recorder</h1>
      <p class="subtitle">실시간 녹음 · 화자 구분 · AI 요약</p>
    </div>
    <div class="lang-wrap">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">
        <span id="langLabel">🇰🇷 한국어</span>
        <span style="font-size:10px;color:var(--text-muted)">▼</span>
      </button>
      <div class="lang-menu" id="langMenu">
        <button class="active" data-lang="ko-KR" onclick="setLang(this)">🇰🇷 한국어</button>
        <button data-lang="en-US" onclick="setLang(this)">🇺🇸 English</button>
        <button data-lang="ja-JP" onclick="setLang(this)">🇯🇵 日本語</button>
        <button data-lang="zh-CN" onclick="setLang(this)">🇨🇳 中文</button>
      </div>
    </div>
  </div>
  <div class="backdrop" id="backdrop" onclick="closeLang()"></div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="card" id="statusCard">
    <div class="status-row">
      <div class="status-indicator">
        <div class="rec-dot" id="recDot">
          <div class="rec-dot-inner"></div>
          <div class="rec-dot-ring"></div>
        </div>
        <span class="status-label" id="statusLabel">대기 중</span>
      </div>
      <span class="timer" id="timer">00:00</span>
    </div>

    <div class="waveform" id="waveform"></div>

    <div id="speakerBadge" class="speaker-badge hidden">
      <span>👥</span>
      <span id="speakerCountText">화자 감지 중...</span>
    </div>

    <!-- Debug status -->
    <div class="debug-status" id="debugStatus"></div>

    <div id="idleControls">
      <div class="rec-btn-wrap">
        <button class="rec-btn" onclick="handleStart()">🎙️</button>
      </div>
      <p class="rec-hint">탭하여 녹음 시작</p>
    </div>

    <div class="controls two" id="recordingControls" style="display:none">
      <button class="btn btn-pause" onclick="handlePause()">⏸ 일시정지</button>
      <button class="btn btn-stop" onclick="handleStop()">⏹ 종료</button>
    </div>

    <div class="controls two" id="pausedControls" style="display:none">
      <button class="btn btn-resume" onclick="handleResume()">▶ 다시 시작</button>
      <button class="btn btn-stop" onclick="handleStop()">⏹ 종료</button>
    </div>

    <div class="controls three" id="doneControls" style="display:none">
      <button class="btn btn-new" onclick="handleStart()">🔄 새 녹음</button>
      <button class="btn btn-summary" id="summaryBtn" onclick="handleSummarize()">✨ AI 요약</button>
      <button class="btn btn-export" onclick="handleExport()">💾</button>
    </div>
  </div>

  <div class="card" style="padding:0; overflow:hidden;">
    <div class="transcript-header">
      <span class="transcript-title">📝 실시간 녹취록</span>
      <span class="transcript-count" id="transcriptCount">0개 문장</span>
    </div>
    <div class="transcript-body" id="transcriptBody">
      <div class="transcript-empty" id="transcriptEmpty">녹음을 시작하면 여기에
내용이 표시됩니다</div>
    </div>
  </div>

  <div class="summary-card" id="summaryCard">
    <div class="summary-header">✨ AI 회의 요약</div>
    <div class="summary-body" id="summaryBody"></div>
  </div>

  <p class="footer">
    Chrome 브라우저 권장 · 마이크 권한 필요<br>Web Speech API 기반
    <br><span class="info-badge">👥 화자 자동 구분 · 💡 AI 요약은 문장 1개부터 가능</span>
  </p>
</div>

<script>
  let status = "idle";
  let lang = "ko-KR";
  let transcripts = [];
  let elapsed = 0;
  let recognition = null;
  let timerInterval = null;
  let lastFinalText = "";
  let lastFinalTime = 0;

  // Speaker detection
  let audioContext = null;
  let analyser = null;
  let micStream = null;
  let currentPitch = 0;
  let currentVolume = 0;
  let pitchHistory = [];
  let volumeHistory = [];

  const SPEAKER_COLORS = [
    { bg: "rgba(99,102,241,0.15)", border: "rgba(99,102,241,0.4)", text: "#a5b4fc", name: "화자 A" },
    { bg: "rgba(34,197,94,0.15)", border: "rgba(34,197,94,0.4)", text: "#86efac", name: "화자 B" },
    { bg: "rgba(251,146,60,0.15)", border: "rgba(251,146,60,0.4)", text: "#fdba74", name: "화자 C" },
    { bg: "rgba(236,72,153,0.15)", border: "rgba(236,72,153,0.4)", text: "#f9a8d4", name: "화자 D" },
    { bg: "rgba(56,189,248,0.15)", border: "rgba(56,189,248,0.4)", text: "#7dd3fc", name: "화자 E" },
    { bg: "rgba(163,130,255,0.15)", border: "rgba(163,130,255,0.4)", text: "#c4b5fd", name: "화자 F" },
  ];

  let speakerProfiles = [];
  let currentSpeaker = 0;
  let lastSpeaker = -1;
  let silenceStart = 0;
  const SILENCE_THRESHOLD = 800;
  const PITCH_DIFF_THRESHOLD = 35;

  const langLabels = { "ko-KR": "🇰🇷 한국어", "en-US": "🇺🇸 English", "ja-JP": "🇯🇵 日本語", "zh-CN": "🇨🇳 中文" };

  const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

  // ── Debug logger ──
  function debugLog(msg) {
    const el = document.getElementById("debugStatus");
    el.classList.add("visible");
    el.textContent = "🔧 " + msg;
    console.log("[MeetingRecorder]", msg);
  }

  // ── Check support on load ──
  if (!SpeechRecognitionAPI) {
    const banner = document.getElementById("errorBanner");
    banner.textContent = "⚠️ 이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 브라우저를 사용해 주세요.";
    banner.classList.add("visible");
  }

  // ── Waveform init ──
  const waveformEl = document.getElementById("waveform");
  const isMobile = window.innerWidth < 640;
  const barCount = isMobile ? 20 : 28;
  for (let i = 0; i < barCount; i++) {
    const bar = document.createElement("div");
    bar.className = "wave-bar";
    bar.style.animationDelay = `${i * 0.04}s`;
    bar.style.setProperty("--h", `${6 + Math.random() * (isMobile ? 20 : 28)}px`);
    bar.style.animationDuration = `${0.35 + Math.random() * 0.65}s`;
    waveformEl.appendChild(bar);
  }

  // ── Audio analysis (runs independently, doesn't block speech recognition) ──
  async function startAudioAnalysis() {
    try {
      debugLog("마이크 접근 요청 중...");
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      debugLog("마이크 접근 성공 ✓");
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(micStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.8;
      source.connect(analyser);
      analyzeAudioLoop();
    } catch(e) {
      debugLog("마이크 접근 실패: " + e.message + " (화자 구분 없이 진행)");
      // ★ 마이크 실패해도 음성인식은 계속 진행
    }
  }

  function analyzeAudioLoop() {
    if (status !== "recording" && status !== "paused") return;
    if (!analyser) return;

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);

    let sum = 0;
    for (let i = 0; i < bufferLength; i++) sum += dataArray[i] * dataArray[i];
    currentVolume = Math.sqrt(sum / bufferLength);

    const minBin = Math.floor(80 * analyser.fftSize / audioContext.sampleRate);
    const maxBin = Math.floor(500 * analyser.fftSize / audioContext.sampleRate);
    let maxVal = 0, maxIndex = 0;
    for (let i = minBin; i < maxBin && i < bufferLength; i++) {
      if (dataArray[i] > maxVal) { maxVal = dataArray[i]; maxIndex = i; }
    }
    currentPitch = maxIndex * audioContext.sampleRate / analyser.fftSize;

    if (currentVolume < 8) {
      if (silenceStart === 0) silenceStart = Date.now();
    } else {
      silenceStart = 0;
      pitchHistory.push(currentPitch);
      volumeHistory.push(currentVolume);
      if (pitchHistory.length > 15) pitchHistory.shift();
      if (volumeHistory.length > 15) volumeHistory.shift();
    }

    requestAnimationFrame(analyzeAudioLoop);
  }

  function getAvgPitch() {
    if (pitchHistory.length === 0) return 0;
    return pitchHistory.reduce((a, b) => a + b, 0) / pitchHistory.length;
  }
  function getAvgVolume() {
    if (volumeHistory.length === 0) return 0;
    return volumeHistory.reduce((a, b) => a + b, 0) / volumeHistory.length;
  }

  function detectSpeaker() {
    const avgPitch = getAvgPitch();
    const avgVol = getAvgVolume();
    if (avgPitch === 0) return currentSpeaker;

    const hadSilence = silenceStart > 0 && (Date.now() - silenceStart) > SILENCE_THRESHOLD;
    let bestMatch = -1, bestDist = Infinity;

    for (let i = 0; i < speakerProfiles.length; i++) {
      const sp = speakerProfiles[i];
      const dist = Math.abs(avgPitch - sp.avgPitch) + Math.abs(avgVol - sp.avgVolume) * 0.3;
      if (dist < bestDist) { bestDist = dist; bestMatch = i; }
    }

    if (bestMatch >= 0 && bestDist < PITCH_DIFF_THRESHOLD && !hadSilence) {
      const sp = speakerProfiles[bestMatch];
      sp.avgPitch = (sp.avgPitch * sp.count + avgPitch) / (sp.count + 1);
      sp.avgVolume = (sp.avgVolume * sp.count + avgVol) / (sp.count + 1);
      sp.count++;
      currentSpeaker = bestMatch;
    } else if (hadSilence || bestDist >= PITCH_DIFF_THRESHOLD) {
      let found = false;
      for (let i = 0; i < speakerProfiles.length; i++) {
        if (Math.abs(avgPitch - speakerProfiles[i].avgPitch) < PITCH_DIFF_THRESHOLD * 1.2) {
          currentSpeaker = i;
          const sp = speakerProfiles[i];
          sp.avgPitch = (sp.avgPitch * sp.count + avgPitch) / (sp.count + 1);
          sp.avgVolume = (sp.avgVolume * sp.count + avgVol) / (sp.count + 1);
          sp.count++;
          found = true;
          break;
        }
      }
      if (!found && speakerProfiles.length < SPEAKER_COLORS.length) {
        speakerProfiles.push({ avgPitch, avgVolume: avgVol, count: 1 });
        currentSpeaker = speakerProfiles.length - 1;
      }
    }

    pitchHistory = [];
    volumeHistory = [];
    silenceStart = 0;
    updateSpeakerBadge();
    return currentSpeaker;
  }

  function updateSpeakerBadge() {
    const badge = document.getElementById("speakerBadge");
    const text = document.getElementById("speakerCountText");
    if (speakerProfiles.length > 0) {
      badge.classList.remove("hidden");
      text.textContent = `${speakerProfiles.length}명 감지됨`;
    }
  }

  function stopAudioAnalysis() {
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioContext && audioContext.state !== "closed") { audioContext.close().catch(() => {}); audioContext = null; }
    analyser = null;
  }

  function isDuplicate(text) {
    const now = Date.now();
    const trimmed = text.trim().toLowerCase();
    if (trimmed.length === 0) return true;
    if (trimmed === lastFinalText.trim().toLowerCase() && (now - lastFinalTime) < 2000) return true;
    return false;
  }

  function toggleLang() {
    if (status === "recording") return;
    document.getElementById("langMenu").classList.toggle("open");
    document.getElementById("backdrop").classList.toggle("open");
  }
  function closeLang() {
    document.getElementById("langMenu").classList.remove("open");
    document.getElementById("backdrop").classList.remove("open");
  }
  function setLang(btn) {
    lang = btn.dataset.lang;
    document.getElementById("langLabel").textContent = langLabels[lang];
    document.querySelectorAll(".lang-menu button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    closeLang();
  }

  function formatTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return h > 0 ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}` : `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  }

  function updateUI() {
    const card = document.getElementById("statusCard");
    const dot = document.getElementById("recDot");
    const label = document.getElementById("statusLabel");
    const timer = document.getElementById("timer");

    card.classList.toggle("recording", status === "recording");
    dot.classList.toggle("active", status === "recording");

    const labels = { idle: "대기 중", recording: "녹음 중", paused: "일시정지", done: "녹음 완료" };
    const colors = { idle: "var(--text-dim)", recording: "var(--red)", paused: "var(--accent)", done: "var(--text-dim)" };
    label.textContent = labels[status];
    label.style.color = colors[status];
    timer.style.color = status === "recording" ? "var(--text)" : "var(--text-dim)";
    timer.textContent = formatTime(elapsed);

    document.querySelectorAll(".wave-bar").forEach(bar => {
      if (status === "recording") {
        bar.classList.add("active");
        bar.style.animation = `waveform ${bar.style.animationDuration} ease-in-out infinite`;
      } else { bar.classList.remove("active"); bar.style.animation = "none"; bar.style.height = "3px"; }
    });

    document.getElementById("idleControls").style.display = status === "idle" ? "block" : "none";
    document.getElementById("recordingControls").style.display = status === "recording" ? "grid" : "none";
    document.getElementById("pausedControls").style.display = status === "paused" ? "grid" : "none";
    document.getElementById("doneControls").style.display = status === "done" ? "grid" : "none";

    if (status === "idle") document.getElementById("speakerBadge").classList.add("hidden");

    document.getElementById("transcriptCount").textContent = `${transcripts.length}개 문장`;

    const empty = document.getElementById("transcriptEmpty");
    if (transcripts.length === 0 && !document.querySelector(".interim")) {
      empty.style.display = "flex";
      empty.textContent = status === "idle" ? "녹음을 시작하면 여기에\n내용이 표시됩니다" : "음성을 감지하는 중...";
    } else { empty.style.display = "none"; }
  }

  function addTranscriptLine(time, text, isInterim, speakerIdx) {
    const body = document.getElementById("transcriptBody");
    const oldInterim = body.querySelector(".interim");
    if (oldInterim) oldInterim.remove();

    const sc = SPEAKER_COLORS[speakerIdx] || SPEAKER_COLORS[0];

    if (!isInterim && speakerIdx !== lastSpeaker && lastSpeaker >= 0 && transcripts.length > 0) {
      const divider = document.createElement("div");
      divider.className = "speaker-divider";
      divider.textContent = "화자 변경";
      body.appendChild(divider);
    }
    if (!isInterim) lastSpeaker = speakerIdx;

    const div = document.createElement("div");
    div.className = isInterim ? "transcript-line interim" : "transcript-line";
    const speakerTag = isInterim ? "" : `<div class="speaker-tag" style="background:${sc.bg};color:${sc.text};border:1px solid ${sc.border}">${sc.name}</div>`;

    div.innerHTML = `
      <span class="transcript-time">${isInterim ? "···" : time}</span>
      <div class="transcript-content">
        ${speakerTag}
        <div class="transcript-text">${escapeHtml(text)}</div>
      </div>
    `;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    document.getElementById("transcriptEmpty").style.display = "none";
  }

  function escapeHtml(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

  // ★ Speech recognition - completely independent from audio analysis
  function startRecognition() {
    if (!SpeechRecognitionAPI) {
      debugLog("SpeechRecognition API 없음");
      return;
    }

    try {
      recognition = new SpeechRecognitionAPI();
      recognition.lang = lang;
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        debugLog("음성 인식 시작됨 ✓ (말씀해 주세요)");
      };

      recognition.onaudiostart = () => {
        debugLog("오디오 감지 시작 ✓");
      };

      recognition.onspeechstart = () => {
        debugLog("음성 감지됨 ✓");
      };

      recognition.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            const trimmed = t.trim();
            if (isDuplicate(trimmed)) {
              const body = document.getElementById("transcriptBody");
              const oi = body.querySelector(".interim");
              if (oi) oi.remove();
              continue;
            }

            const ts = new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
            const speaker = detectSpeaker();

            lastFinalText = trimmed;
            lastFinalTime = Date.now();
            transcripts.push({ text: trimmed, time: ts, speaker });

            const body = document.getElementById("transcriptBody");
            const oi = body.querySelector(".interim");
            if (oi) oi.remove();
            addTranscriptLine(ts, trimmed, false, speaker);
            updateUI();
            debugLog(`문장 ${transcripts.length}개 기록됨`);
          } else {
            interim += t;
          }
        }
        if (interim) addTranscriptLine("", interim, true, currentSpeaker);
      };

      recognition.onerror = (e) => {
        debugLog("오류: " + e.error);
        if (e.error === "not-allowed") {
          const banner = document.getElementById("errorBanner");
          banner.textContent = "⚠️ 마이크 권한이 차단되어 있습니다. 주소창 왼쪽 🔒 아이콘 → 사이트 설정 → 마이크 → 허용 후 새로고침 해주세요.";
          banner.classList.add("visible");
          handleStop();
          return;
        }
        if (e.error === "no-speech" || e.error === "aborted") return;
        // Auto-restart on other errors
        if (status === "recording") {
          setTimeout(() => { try { startRecognition(); } catch(_) {} }, 500);
        }
      };

      recognition.onend = () => {
        debugLog("음성 인식 세션 종료 → 재시작 중...");
        if (status === "recording") {
          setTimeout(() => { try { startRecognition(); } catch(_) {} }, 200);
        }
      };

      recognition.start();
      debugLog("음성 인식 요청 중...");

    } catch(e) {
      debugLog("음성 인식 시작 실패: " + e.message);
    }
  }

  async function handleStart() {
    transcripts = [];
    elapsed = 0;
    lastFinalText = "";
    lastFinalTime = 0;
    speakerProfiles = [];
    currentSpeaker = 0;
    lastSpeaker = -1;
    pitchHistory = [];
    volumeHistory = [];
    silenceStart = 0;

    document.getElementById("transcriptBody").innerHTML =
      '<div class="transcript-empty" id="transcriptEmpty">음성을 감지하는 중...</div>';
    document.getElementById("summaryCard").classList.remove("visible");
    document.getElementById("summaryBody").innerHTML = "";
    document.getElementById("speakerBadge").classList.add("hidden");
    document.getElementById("errorBanner").classList.remove("visible");

    status = "recording";
    updateUI();
    debugLog("녹음 시작 준비...");

    timerInterval = setInterval(() => {
      elapsed++;
      document.getElementById("timer").textContent = formatTime(elapsed);
    }, 1000);

    // ★ 핵심 수정: 먼저 음성인식을 시작하고, 오디오 분석은 별도로 시도
    // 음성인식이 마이크 권한을 받아오기 때문에 이걸 먼저 실행
    startRecognition();

    // 화자 분석은 별도로 (실패해도 음성인식에 영향 없음)
    setTimeout(() => {
      startAudioAnalysis();
    }, 1000);
  }

  function handlePause() {
    if (recognition) { try { recognition.abort(); } catch(_) {} recognition = null; }
    clearInterval(timerInterval);
    status = "paused";
    updateUI();
    debugLog("일시정지됨");
  }

  function handleResume() {
    status = "recording";
    updateUI();
    timerInterval = setInterval(() => {
      elapsed++;
      document.getElementById("timer").textContent = formatTime(elapsed);
    }, 1000);
    startRecognition();
    if (!analyser) setTimeout(() => startAudioAnalysis(), 500);
    debugLog("재개됨");
  }

  function handleStop() {
    if (recognition) { try { recognition.abort(); } catch(_) {} recognition = null; }
    clearInterval(timerInterval);
    stopAudioAnalysis();
    const oi = document.getElementById("transcriptBody").querySelector(".interim");
    if (oi) oi.remove();
    status = "done";
    updateUI();
    debugLog("녹음 완료 — " + transcripts.length + "개 문장 기록됨");
  }

  async function handleSummarize() {
    if (transcripts.length === 0) return;
    const btn = document.getElementById("summaryBtn");
    btn.textContent = "⏳ 요약 중...";
    btn.style.opacity = "0.5";
    btn.disabled = true;

    const summaryCard = document.getElementById("summaryCard");
    const summaryBody = document.getElementById("summaryBody");
    summaryCard.classList.add("visible");
    summaryBody.innerHTML = `
      <div class="skeleton" style="width:100%"></div>
      <div class="skeleton" style="width:80%;animation-delay:0.15s"></div>
      <div class="skeleton" style="width:90%;animation-delay:0.3s"></div>
      <div class="skeleton" style="width:60%;animation-delay:0.45s"></div>
    `;

    const fullText = transcripts.map(t => {
      const name = SPEAKER_COLORS[t.speaker]?.name || "화자";
      return `[${t.time}] ${name}: ${t.text}`;
    }).join("\n");

    const speakerCount = speakerProfiles.length || 1;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `다음은 ${speakerCount}명이 참여한 회의 녹취록입니다. 화자별 발언을 고려하여 아래 형식으로 한국어 요약을 작성해주세요:\n\n## 📋 회의 요약\n- 전체적인 회의 내용을 2~3문장으로 요약\n\n## 👥 참석자별 주요 발언\n- 각 화자의 핵심 발언 정리\n\n## 🔑 핵심 안건\n- 논의된 주요 안건들을 항목별로 정리\n\n## ✅ 결정 사항\n- 회의에서 결정된 내용들\n\n## 📌 할 일 (Action Items)\n- 후속 조치가 필요한 항목들 (가능하면 담당자 표시)\n\n---\n녹취록:\n${fullText}`,
          }],
        }),
      });
      const data = await res.json();
      const text = data.content?.map(c => c.text || "").filter(Boolean).join("\n");
      renderSummary(text || "요약을 생성할 수 없습니다.");
    } catch (err) {
      renderSummary("⚠️ 요약 생성 중 오류가 발생했습니다: " + err.message);
    }

    btn.textContent = "✨ AI 요약";
    btn.style.opacity = "1";
    btn.disabled = false;
  }

  function renderSummary(text) {
    const body = document.getElementById("summaryBody");
    let html = "";
    text.split("\n").forEach(line => {
      if (line.startsWith("## ")) html += `<h3>${escapeHtml(line.replace("## ", ""))}</h3>`;
      else if (line.startsWith("- ")) html += `<div class="item"><span class="bullet">•</span><span class="item-text">${escapeHtml(line.replace("- ", ""))}</span></div>`;
      else if (line.startsWith("---")) html += `<hr>`;
      else if (line.trim() === "") html += `<div style="height:6px"></div>`;
      else html += `<p>${escapeHtml(line)}</p>`;
    });
    body.innerHTML = html;
  }

  function handleExport() {
    let content = `회의 녹취록\n녹음 시간: ${formatTime(elapsed)}\n참석자: ${speakerProfiles.length || 1}명\n${"=".repeat(40)}\n\n`;
    transcripts.forEach(t => {
      const name = SPEAKER_COLORS[t.speaker]?.name || "화자";
      content += `[${t.time}] ${name}: ${t.text}\n`;
    });
    const summaryText = document.getElementById("summaryBody").textContent;
    if (summaryText.trim()) content += `\n${"=".repeat(40)}\n요약\n${"=".repeat(40)}\n${summaryText}`;
    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `회의록_${new Date().toLocaleDateString("ko-KR")}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  updateUI();
</script>
</body>
</html>
